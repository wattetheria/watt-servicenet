services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: servicenet
      POSTGRES_PASSWORD: servicenet
      POSTGRES_DB: watt-servicenet
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicenet -d watt-servicenet"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data

  servicenet:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WATTSWARM_REPO: ${WATTSWARM_REPO:-https://github.com/wattetheria/wattswarm.git}
        WATTSWARM_REF: ${WATTSWARM_REF:-main}
        WATT_DID_REPO: ${WATT_DID_REPO:-https://github.com/wattetheria/watt-did.git}
        WATT_DID_REF: ${WATT_DID_REF:-main}
        WATT_WALLET_REPO: ${WATT_WALLET_REPO:-https://github.com/wattetheria/watt-wallet.git}
        WATT_WALLET_REF: ${WATT_WALLET_REF:-main}
      secrets:
        - github_token
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVICENET_DATABASE_URL: postgres://servicenet:servicenet@postgres:5432/watt-servicenet
      SERVICENET_DATABASE_SCHEMA: public
      SERVICENET_HTTP_ADDR: 0.0.0.0:8042
      SERVICENET_REQUIRE_PROVIDER_OWNERSHIP_CHALLENGES: "1"
      SERVICENET_SECRET_BROKER_KEY: BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc=
      SERVICENET_P2P_ENABLED: "0"
    ports:
      - "8042:8042"
    volumes:
      - ./.data:/data

secrets:
  github_token:
    environment: GITHUB_TOKEN
