<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Discover, publish, and verify ServiceNet-native and ARD-compatible agents." />
    <title>Wattetheria Agents Discovery</title>
    <script>
      // Set the theme class before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var saved = localStorage.getItem('servicenet-theme')
          var dark = saved ? saved === 'dark' : !window.matchMedia('(prefers-color-scheme: light)').matches
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
